name: BMW Auto-Update Specs

on:
  schedule:
    - cron: '0 19 * * *' # Runs every day at 02:00 AM ICT (UTC+7 -> 19:00 UTC)
  workflow_dispatch: # Allows manual runs from the GitHub Actions tab

jobs:
  update-specs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright google-genai pypdf python-dotenv requests google-api-python-client google-auth
        playwright install chromium

    - name: Run Scraper (Download new PDFs)
      run: |
        python pdf_scraper.py

    - name: Run Extractor & Compare (Process PDFs with Gemini)
      env:
        GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
        GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        MINERU_API_TOKEN: ${{ secrets.MINERU_API_TOKEN }}
      run: |
        python -u batch_extractor.py --lang th
        python -u batch_extractor.py --lang en
        python -u scratch/compare_th_en_db.py

    - name: Automatically Archive Discontinued Models
      run: |
        python scratch/archive_discontinued.py

    - name: Run Auto-Image Scraper (Download missing vehicle previews)
      run: |
        python auto_image_scraper.py

    - name: Upload PDFs to Google Drive
      env:
        GDRIVE_SERVICE_ACCOUNT_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
        GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
        GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
        GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
        GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      run: |
        python scratch/upload_to_gdrive.py

    - name: Generate Run Report
      run: |
        python scratch/generate_report.py

    - name: Create GitHub Issue (Email Notification)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [ -f report.md ]; then
          gh issue create --title "BMW Auto-Update Report - $(date +'%Y-%m-%d')" --body-file report.md
        fi

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Ensure we are on the correct branch before pushing (prevent detached HEAD error)
        git checkout ${{ github.head_ref || github.ref_name }}
        
        # Check if there are any database or audit changes
        git add bmw_master_specs.json bmw_master_specs_en.json specsheet_audit_report.md
        git add -f bmw_ai_specs.json bmw_ai_specs_en.json || true
        git add -f bmw_brochures_auto/*.pdf bmw_brochures_auto_en/*.pdf || true
        git add -f images/**/*.png || true
        if [ -n "$(git status --porcelain bmw_master_specs.json bmw_master_specs_en.json bmw_ai_specs.json bmw_ai_specs_en.json specsheet_audit_report.md images/)" ]; then
          git commit -m "Auto-update: New brochures, specifications, images and audit report [skip ci]"
          git push
        else
          git status
          echo "No changes to commit"
        fi
